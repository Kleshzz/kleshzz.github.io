  <script>
    function copyAddr(el) {
      const addr = el.getAttribute('data-addr');
      if (el.textContent === "copied") return;

      navigator.clipboard.writeText(addr);
      el.textContent = "copied";
      setTimeout(function () { el.textContent = addr; }, 800);
    }
  </script>
